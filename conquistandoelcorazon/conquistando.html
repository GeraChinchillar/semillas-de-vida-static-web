<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensajes — Ministerio Palabra Viva</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="conquistando.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">✝ <span>Palabra</span> Viva</div>
    <a class="back-btn" href="./../index.html">← Inicio</a>
  </div>
</header>

<section class="hero">
  <h1>Mensajes <em>grabados</em></h1>
  <p>Accede a todas nuestras reuniones semanales. Escúchalos cuando quieras, donde quieras.</p>
  <div class="hero-stats">
    <div class="stat"><span class="stat-number" id="total-count">—</span><span class="stat-label">Sermones</span></div>
    <div class="stat"><span class="stat-number" id="preacher-count">—</span><span class="stat-label">Predicadores</span></div>
  </div>
</section>

<div class="controls">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar por título, predicador o descripción…"/>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
  </div>
</div>

<section class="sermons-section">
  <div class="section-header">
    <h2 class="section-title">Todos los mensajes</h2>
    <span class="sermon-count" id="showing-count"></span>
  </div>
  <div id="sermon-grid">
    <div class="loading"><div class="spinner"></div>Cargando sermones…</div>
  </div>
</section>

<footer><p>© 2024 <span>Ministerio Palabra Viva</span> — Todos los derechos reservados</p></footer>

  <script src="conquistando.js"></script>
</body>
</html>
